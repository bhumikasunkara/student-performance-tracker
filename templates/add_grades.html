<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Grades</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>📘 Add Grades</h1>

    <form method="POST">

        <input
            type="text"
            name="roll"
            placeholder="Enter Roll Number"
            required
        >

        <br><br>

        <input
            type="text"
            name="subject"
            placeholder="Enter Subject"
            required
        >

        <br><br>

        <input
            type="number"
            name="marks"
            placeholder="Enter Marks"
            min="0"
            max="100"
            required
        >

        <br><br>

        <button type="submit">
            Save Grades
        </button>

    </form>
    <br><br>

    <a href="/">
       <button>🏠 Back to Home</button>
    </a>

</div>

</body>
</html>
