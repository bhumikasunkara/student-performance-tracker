<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Average Report</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>📊 Subject Average Report</h1>


    <form method="POST">

        <input 
            type="text"
            name="subject"
            placeholder="Enter Subject Name"
            required
        >

        <br><br>

        <button type="submit">
            Calculate Average
        </button>

    </form>


    <br>


    {% if message %}
        <p class="error">{{ message }}</p>
    {% endif %}



    {% if avg %}

    <table border="1" cellpadding="10" cellspacing="0">

        <tr>
            <th>Subject</th>
            <th>Class Average Marks</th>
        </tr>


        <tr>
            <td>{{ subject }}</td>
            <td>{{ avg }}</td>
        </tr>


    </table>

    {% endif %}



    <br><br>


    <a href="/">
        <button>🏠 Back to Home</button>
    </a>


</div>

</body>

</html>
